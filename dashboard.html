<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

¿    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand">Mi Progreso</span>

            <a class="btn btn-outline-light btn-sm" href="login.html">
                Cerrar Sesión
            </a>
        </div>
    </nav>

    <div class="container">

        <h2 class="mb-4">Seguimiento de Salud</h2>

        <div class="card mb-4">
            <div class="card-body">

                <form class="row g-3">

                    <div class="col-12 col-md-4">
                        <label class="form-label">Peso actual (kg)</label>
                        <input type="number" class="form-control" placeholder="00.0" required>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Fecha de registro</label>
                        <input type="date" class="form-control" required>
                    </div>

                    <div class="col-12 col-md-4">
                        <button class="btn btn-success w-100" type="submit">
                            Registrar Peso
                        </button>
                    </div>

                </form>

            </div>
        </div>

        <h4 class="mb-3">Historial de Registros</h4>

        <div class="table-responsive">
            <table class="table table-striped table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>Fecha</th>
                        <th>Peso Registrado</th>
                        <th>Estado</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>2026-06-25</td>
                        <td>74.5 kg</td>
                        <td><span class="badge bg-secondary">Estable</span></td>
                    </tr>

                    <tr>
                        <td>2026-06-27</td>
                        <td>74.0 kg</td>
                        <td><span class="badge bg-success">Mejorando</span></td>
                    </tr>

                    <tr>
                        <td>2026-06-30</td>
                        <td>73.7 kg</td>
                        <td><span class="badge bg-primary">Progreso</span></td>
                    </tr>
                </tbody>

            </table>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">Evolución del Peso</h5>
                <canvas id="graficaPeso"></canvas>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const ctx = document.getElementById("graficaPeso");

        new Chart(ctx, {
            type: "line",
            data: {
                labels: ["25 Jun", "27 Jun", "30 Jun"],
                datasets: [{
                    label: "Peso",
                    data: [74.5, 74.0, 73.7]
                }]
            }
        });
    </script>

</body>
</html>
