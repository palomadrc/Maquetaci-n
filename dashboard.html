<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand">Mi Progreso</span>

            <div class="navbar-nav ms-auto">
                <a class="nav-link btn btn-outline-danger btn-sm text-white px-3" href="index.html"> Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">

        <h2 class="mb-4">Seguimiento de Salud</h2>

        <div class="card mb-5 bg-light">
            <div class="card-body">

                <form class="row g-3 align-items-end">

                    <div class="col-12 col-md-4">
                        <label class="form-label">Peso actual (kg)</label>
                        <input type="number" step="0.1" class="form-control" placeholder="00.0" required>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Fecha de registro</label>
                        <input type="date" class="form-control" required>
                    </div>

                    <div class="col-12 col-md-4">
                        <button type="submit"
                                class="btn btn-success w-100"> Registrar Peso</button>
                    </div>

                </form>

            </div>
        </div>

        <div class="mt-4">
            <h4 class="mb-3">Historial de Registros</h4>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Peso Registrado</th>
                            <th>Estado</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>2026-06-25</td>
                            <td>74.5 kg</td>
                            <td>
                                <span class="badge bg-secondary">
                                    Estable
                                </span>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
